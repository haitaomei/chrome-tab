<!DOCTYPE html>
<html>
<head>
  <title>New Tab</title>
  <link rel="stylesheet" type="text/css" href="newtab.css">
</head>
<body>
  <div id="vanta-bg"></div>
  <div class="container">
    <div class="welcome-message">
      <h1 id="greeting">Welcome Haitao</h1>
    </div>
    <div class="bookmarks">
      <ul>
        <li><a href="https://www.google.com"><img src="icons/google.png" class="google-logo"/><span>Google</span></a></li>
        <li><a href="https://www.youtube.com"><img src="icons/youtube.svg" class="youtube-logo"/><span>YouTube</span></a></li>
        <li><a href="https://chat.openai.com"><img src="icons/openai-icon.svg" class="openai-logo"/><span>ChatGPT</span></a></li>
        <li><a href="https://gemini.google.com/app"><img src="icons/gemini.png" class="claude-logo"/><span>Gemini</span></a></li>
        <li><a href="https://www.google.com/maps"><img src="icons/Google-Maps-Logo.png" class="google-map-logo"/><span>Google Maps</span></a></li>
        <li><a href="https://translate.google.com/?sl=auto&tl=zh-CN&op=translate"><img src="icons/Google_Translate.png" class="google-translate-logo"/><span>Translate</span></a></li>
      </ul>
    </div>
    <form id="search-form">
      <input type="text" id="search-input" placeholder="Search Google or type a URL">
    </form>
  </div>
  <script src="js/three.r134.min.js"></script>
  <script src="js/vanta.dots.min.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
